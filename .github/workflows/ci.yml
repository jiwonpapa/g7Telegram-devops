name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 2026-07-17 master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - name: Audit Rust dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
          cargo audit

  package:
    runs-on: ubuntu-22.04
    needs: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # 2026-07-17 master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-targets: false
      - name: Validate shell and workflow files
        run: |
          shellcheck scripts/*.sh packaging/deb/* packaging/libexec/*
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$(go env GOPATH)/bin/actionlint"
      - name: Build Debian package
        run: |
          cargo install cargo-deb --version 3.7.0 --locked
          cargo deb -p g7tg-agent
          mkdir -p dist
          package="$(find target/debian -maxdepth 1 -name 'g7telegram-devops_*_amd64.deb' -print -quit)"
          test -n "$package"
          cp "$package" dist/g7telegram-devops.deb
          scripts/check-package.sh dist/g7telegram-devops.deb
      - name: Ubuntu 22.04 package smoke under 2GB
        run: |
          docker run --rm --memory=2g \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/workspace-scripts:ro" \
            ubuntu:22.04 \
            /workspace-scripts/container-smoke.sh /dist/g7telegram-devops.deb
      - name: Ubuntu 24.04 package smoke under 2GB
        run: |
          docker run --rm --memory=2g \
            -v "$PWD/dist:/dist:ro" \
            -v "$PWD/scripts:/workspace-scripts:ro" \
            ubuntu:24.04 \
            /workspace-scripts/container-smoke.sh /dist/g7telegram-devops.deb
