name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build package
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "g7tg-agent") | .version')"
          version="${GITHUB_REF_NAME#v}"
          test "$crate_version" = "$version"
          cargo deb -p g7tg-agent
          mkdir -p dist
          package="$(find target/debian -maxdepth 1 -name '*.deb' -print -quit)"
          test -n "$package"
          cp "$package" "dist/g7telegram-devops_${version}_amd64.deb"
          cd dist
          sha256sum *.deb > SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
