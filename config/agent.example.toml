server_name = "my-vps"
bot_token_file = "/run/credentials/g7tg-agent.service/bot-token"
state_database = "/var/lib/g7telegram-devops/state.sqlite3"
poll_timeout_seconds = 40
retry_seconds = 2

# 자동 탐지 외에 표시할 root 관리 unit만 추가하십시오.
extra_service_units = []

# root allowlist를 검토한 뒤에만 활성화하십시오.
service_actions_enabled = false
action_executor = "/usr/lib/g7telegram-devops/g7tg-exec"
approval_ttl_seconds = 45

# sudo g7tg setup에서만 변경합니다. 기본값은 false입니다.
server_reboot_enabled = false

monitor_interval_seconds = 60
incident_confirmation_count = 2
cpu_warning_percent = 90.0
load_warning_per_cpu = 1.5
memory_warning_percent = 90.0
swap_warning_percent = 80.0
disk_warning_percent = 85.0

# 본문은 검사하지 않습니다. status, latency, TLS 유효기간만 확인합니다.
# [[web_checks]]
# name = "대표 사이트"
# url = "https://example.com/"
# expected_status_min = 200
# expected_status_max = 399
# timeout_seconds = 5
# tls_warning_days = 14
